<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, shrink-to-fit=no, viewport-fit=cover">
  <title>Hẹn người yêu đi chơi 💕</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, sans-serif;
      background: linear-gradient(145deg, #ffe6f0 0%, #ffddee 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      margin: 0;
    }

    .container {
      width: 100%;
      max-width: 450px;
      background: rgba(255, 245, 250, 0.85);
      backdrop-filter: blur(20px);
      background: #fff0f5;
      box-shadow: 0 25px 50px -10px rgba(233, 120, 160, 0.25);
      border-radius: 40px;
      padding: 30px 24px;
      text-align: center;
      transition: all 0.2s ease;
      border: 1px solid rgba(255, 182, 193, 0.6);
    }

    .page {
      display: block;
    }

    .hidden-page {
      display: none !important;
    }

    h2 {
      font-size: 2.2rem;
      color: #d43f6b;
      margin-bottom: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
      word-break: break-word;
    }

    .emoji-big {
      font-size: 4.5rem;
      margin: 12px 0 8px;
      filter: drop-shadow(0 8px 12px rgba(255, 105, 135, 0.3));
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      margin: 28px 0 18px;
    }

    .btn {
      background: white;
      border: none;
      padding: 16px 32px;
      border-radius: 100px;
      font-weight: 700;
      font-size: 1.3rem;
      cursor: pointer;
      background: #ffe4ec;
      color: #b3405a;
      box-shadow: 0 8px 18px rgba(200, 100, 120, 0.25);
      transition: all 0.2s ease;
      flex: 1 1 auto;
      min-width: 130px;
      border: 1px solid #ffb6c1;
      backdrop-filter: blur(4px);
      letter-spacing: 0.3px;
      touch-action: manipulation;
    }

    .btn:hover {
      background: #ffd0db;
      transform: scale(1.02);
      box-shadow: 0 12px 22px rgba(210, 80, 110, 0.35);
    }

    .btn:active {
      transform: scale(0.96);
      background: #ffbacb;
    }

    .no-btn {
      background: #fce4ec;
      color: #b3415c;
    }

    .yes-btn {
      background: #ffb7c5;
      color: #a12b42;
      font-weight: 800;
    }

    .message-box {
      background: #fff0f3;
      border-radius: 30px;
      padding: 14px 18px;
      margin: 15px 0 10px;
      color: #c13b57;
      font-weight: 600;
      font-size: 1.2rem;
      border: 1px dashed #f590a8;
    }

    select, input[type="date"], input[type="text"] {
      width: 100%;
      padding: 16px 18px;
      border-radius: 60px;
      border: 1px solid #ffb7c5;
      background: #fff5f8;
      font-size: 1.1rem;
      margin: 10px 0 16px;
      outline: none;
      color: #632c3b;
      font-weight: 500;
      text-align: center;
      background: white;
      box-shadow: inset 0 2px 8px rgba(255, 140, 160, 0.15);
      -webkit-appearance: none;
      appearance: none;
      font-family: inherit;
    }

    .option-group {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin: 18px 0 14px;
    }

    .chip {
      background: #ffeaf1;
      padding: 14px 20px;
      border-radius: 50px;
      font-weight: 600;
      color: #b13b53;
      cursor: pointer;
      border: 1px solid #f9a5b9;
      transition: 0.2s;
      flex: 1 1 calc(50% - 14px);
      min-width: 120px;
      text-align: center;
      background: white;
      box-shadow: 0 4px 10px rgba(255, 140, 170, 0.2);
    }

    .chip.selected {
      background: #f7738b;
      color: white;
      border-color: #e64a6b;
      box-shadow: 0 10px 18px #f1607c70;
      font-weight: 700;
    }

    .next-btn {
      background: #ff7b9c;
      color: white;
      margin-top: 20px;
      width: 100%;
      font-size: 1.4rem;
      padding: 18px;
      border: none;
      border-radius: 100px;
      font-weight: 700;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, #fd7b9c, #e75472);
      box-shadow: 0 12px 24px rgba(235, 80, 110, 0.45);
    }

    .love-final {
      font-size: 2.8rem;
      font-weight: 800;
      color: #ce3660;
      margin: 15px 0 8px;
    }

    .sub-text {
      color: #b44b63;
      font-size: 1.2rem;
      margin: 6px 0 18px;
      font-style: italic;
    }

    hr {
      border: 0.5px solid #ffc0cb;
      margin: 20px 0 8px;
      opacity: 0.7;
    }

    button {
      user-select: none;
    }
  </style>
</head>
<body>
<div class="container" id="appContainer">
  <!-- TRANG 1: Em có yêu anh không -->
  <div id="page1" class="page">
    <div class="emoji-big">🥺💗</div>
    <h2>Em có yêu anh không?</h2>
    <div class="buttons">
      <button class="btn yes-btn" id="yesLoveBtn">Yêu nhiều ❤️</button>
      <button class="btn no-btn" id="noLoveBtn">Không 🙈</button>
    </div>
    <div id="loveMessage" class="message-box" style="display: none;"></div>
  </div>

  <!-- TRANG 2: Chọn lịch đi chơi -->
  <div id="page2" class="page hidden-page">
    <div class="emoji-big">📅✨</div>
    <h2>Chọn ngày đi chơi nè</h2>
    <input type="date" id="datePicker" />
    <button class="btn next-btn" id="toPlaceBtn">Tiếp theo ➡️</button>
    <div id="dateWarning" style="color:#d43f6b; margin-top:8px; font-weight:500;"></div>
  </div>

  <!-- TRANG 3: Chọn nơi muốn đi -->
  <div id="page3" class="page hidden-page">
    <div class="emoji-big">📍🍜</div>
    <h2>Muốn đi đâu nhất?</h2>
    <div class="option-group" id="placeOptions">
      <div class="chip" data-place="Đi ăn">🍣 Đi ăn</div>
      <div class="chip" data-place="Đi chơi">🎢 Đi chơi</div>
      <div class="chip" data-place="Đi lượn">🌃 Đi lượn</div>
      <div class="chip" data-place="custom" id="customChip">✍️ Khác...</div>
    </div>
    <input type="text" id="customPlaceInput" placeholder="Nhập nơi em thích..." style="display:none; margin-top:6px;" />
    <button class="btn next-btn" id="toFinalBtn">Gửi lịch hẹn 💌</button>
    <div id="placeWarning" style="color:#d43f6b; margin-top:6px; font-weight:500;"></div>
  </div>

  <!-- TRANG 4: Tuân lệnh embe -->
  <div id="page4" class="page hidden-page">
    <div class="emoji-big">👑🐣</div>
    <h2 class="love-final">Tuân lệnh embeiuuuu</h2>
    <div style="font-size:2.4rem;">💖🐻💖</div>
    <p class="sub-text">Iu embe nhìu lắm luôn ý</p>
    <div id="summaryBox" style="background: #ffeef4; border-radius: 28px; padding: 20px; margin: 18px 0; color:#bf2f4b; font-weight:600; font-size:1.2rem; text-align:left; line-height:1.8;">
      ⏳ Đang tổng hợp...
    </div>
    <button class="btn next-btn" id="restartBtn" style="background:#ffb7c5; color:#a13048;">Hẹn lại từ đầu 🔁</button>
  </div>
</div>

<script>
  (function() {
    // ----- State -----
    let selectedPlace = null;       // 'Đi ăn', 'Đi chơi', 'Đi lượn', or custom string
    let customPlaceText = '';

    // ----- DOM elements -----
    const page1 = document.getElementById('page1');
    const page2 = document.getElementById('page2');
    const page3 = document.getElementById('page3');
    const page4 = document.getElementById('page4');

    // Page 1
    const yesLoveBtn = document.getElementById('yesLoveBtn');
    const noLoveBtn = document.getElementById('noLoveBtn');
    const loveMessage = document.getElementById('loveMessage');

    // Page 2
    const datePicker = document.getElementById('datePicker');
    const toPlaceBtn = document.getElementById('toPlaceBtn');
    const dateWarning = document.getElementById('dateWarning');

    // Page 3
    const placeChips = document.querySelectorAll('#placeOptions .chip');
    const customChip = document.getElementById('customChip');
    const customPlaceInput = document.getElementById('customPlaceInput');
    const toFinalBtn = document.getElementById('toFinalBtn');
    const placeWarning = document.getElementById('placeWarning');

    // Page 4
    const summaryBox = document.getElementById('summaryBox');
    const restartBtn = document.getElementById('restartBtn');

    // ----- Helper: switch page -----
    function showPage(page) {
      page1.classList.add('hidden-page');
      page2.classList.add('hidden-page');
      page3.classList.add('hidden-page');
      page4.classList.add('hidden-page');
      page.classList.remove('hidden-page');
    }

    // ----- Reset state for new round (except page1) -----
    function resetSelectionState() {
      selectedPlace = null;
      customPlaceText = '';
      if (customPlaceInput) {
        customPlaceInput.style.display = 'none';
        customPlaceInput.value = '';
      }
      // remove selected class from chips
      placeChips.forEach(chip => chip.classList.remove('selected'));
      if (datePicker) datePicker.value = '';
      if (dateWarning) dateWarning.innerText = '';
      if (placeWarning) placeWarning.innerText = '';
      if (loveMessage) {
        loveMessage.style.display = 'none';
        loveMessage.innerText = '';
      }
    }

    // ----- PAGE 1: Xử lý nút Không -----
    noLoveBtn.addEventListener('click', function(e) {
      // Hiển thị thông báo "oops sai rùi" và yêu cầu chọn lại
      loveMessage.style.display = 'block';
      loveMessage.innerText = '🙈 Oops sai rùi! Chọn lại đi em ơi 💗';
      // Không chuyển trang, chỉ hiện thông báo đáng yêu
    });

    // ----- PAGE 1: Nút Yêu nhiều -> sang trang 2 -----
    yesLoveBtn.addEventListener('click', function() {
      // Ẩn thông báo nếu có
      loveMessage.style.display = 'none';
      // reset các lựa chọn trước đó để sạch sẽ
      resetSelectionState();
      // set ngày mặc định là hôm nay (để tiện)
      if (datePicker) {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        datePicker.value = `${yyyy}-${mm}-${dd}`;
      }
      showPage(page2);
    });

    // ----- PAGE 2: chọn ngày -> sang trang 3 (kiểm tra có chọn ngày) -----
    toPlaceBtn.addEventListener('click', function() {
      const dateValue = datePicker.value;
      if (!dateValue) {
        dateWarning.innerText = '⚠️ Bé chọn một ngày đi chơi nha~';
        return;
      }
      dateWarning.innerText = '';
      // Lưu ý: không cần lưu riêng, sẽ lấy từ input khi tổng hợp
      showPage(page3);
    });

    // ----- PAGE 3: Xử lý chọn nơi (chip) -----
    placeChips.forEach(chip => {
      chip.addEventListener('click', function(e) {
        const place = this.dataset.place;
        
        // Xóa selected tất cả chips
        placeChips.forEach(c => c.classList.remove('selected'));
        
        if (place === 'custom') {
          // Hiện input nhập tùy chọn khác
          customPlaceInput.style.display = 'block';
          customPlaceInput.focus();
          // Thêm class selected cho chip "Khác"
          this.classList.add('selected');
          // Reset selectedPlace thành null, chờ nhập text
          selectedPlace = null;
          // Nếu đã có text trong input thì cập nhật
          if (customPlaceInput.value.trim() !== '') {
            selectedPlace = customPlaceInput.value.trim();
          }
        } else {
          // Ẩn input custom
          customPlaceInput.style.display = 'none';
          // Đặt selectedPlace là lựa chọn có sẵn
          selectedPlace = place;
          this.classList.add('selected');
          // Xóa custom text cũ
          customPlaceText = '';
          customPlaceInput.value = '';
        }
        placeWarning.innerText = '';
      });
    });

    // Khi người dùng gõ vào ô custom, cập nhật selectedPlace
    customPlaceInput.addEventListener('input', function() {
      const val = this.value.trim();
      if (val !== '') {
        selectedPlace = val;
        customPlaceText = val;
        // Đảm bảo chip "Khác" vẫn selected
        placeChips.forEach(c => c.classList.remove('selected'));
        customChip.classList.add('selected');
      } else {
        // Nếu xoá trắng thì coi như chưa chọn
        selectedPlace = null;
        customPlaceText = '';
        customChip.classList.add('selected'); // vẫn giữ chip khác selected
      }
      placeWarning.innerText = '';
    });

    // Khi bấm nút tiếp từ trang 3 sang trang 4
    toFinalBtn.addEventListener('click', function() {
      // Kiểm tra đã chọn nơi chưa
      if (!selectedPlace) {
        placeWarning.innerText = '💬 Bé chọn một nơi muốn đi nha (hoặc nhập khác)';
        return;
      }
      // Tổng hợp thông tin hiển thị trang 4
      const dateVal = datePicker.value;
      let displayDate = '📆 Chưa chọn ngày';
      if (dateVal) {
        // format ngày thân thiện dd/mm/yyyy
        const [year, month, day] = dateVal.split('-');
        displayDate = `📅 ${day}/${month}/${year}`;
      }
      
      let placeDisplay = '';
      if (selectedPlace === 'Đi ăn') placeDisplay = '🍣 Đi ăn';
      else if (selectedPlace === 'Đi chơi') placeDisplay = '🎢 Đi chơi';
      else if (selectedPlace === 'Đi lượn') placeDisplay = '🌃 Đi lượn';
      else placeDisplay = `✨ ${selectedPlace}`;

      summaryBox.innerHTML = `
        <div style="font-size:1.4rem; text-align:center; margin-bottom:10px;">📋 Chi tiết hẹn hò</div>
        <div>${displayDate}</div>
        <div>📍 Địa điểm: ${placeDisplay}</div>
        <div style="margin-top:12px; text-align:center; font-style:italic;">💞 Anh chờ em tới lun 💞</div>
      `;
      
      showPage(page4);
    });

    // ----- Quay lại từ đầu (restart) -----
    restartBtn.addEventListener('click', function() {
      resetSelectionState();
      // quay về trang 1
      showPage(page1);
      // Ẩn message nếu có
      if (loveMessage) {
        loveMessage.style.display = 'none';
      }
      // reset date về hôm nay để lần sau dùng
      if (datePicker) {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        datePicker.value = `${yyyy}-${mm}-${dd}`;
      }
    });

    // Khởi tạo ban đầu: set ngày hôm nay cho datePicker (khi load trang)
    window.addEventListener('load', function() {
      if (datePicker) {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        datePicker.value = `${yyyy}-${mm}-${dd}`;
      }
      // đảm bảo trang 1 hiện
      showPage(page1);
    });

    // Xử lý nếu ai đó cố tình nhấn "Không" nhiều lần vẫn ổn.
  })();
</script>
</body>
</html>
