<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, shrink-to-fit=no, viewport-fit=cover">
  <title>Hẹn người yêu đi chơi 💕</title>
  
  <!-- EmailJS SDK v4 -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, sans-serif;
      background: linear-gradient(145deg, #ffe6f0 0%, #ffddee 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      margin: 0;
    }

    .container {
      width: 100%;
      max-width: 450px;
      background: #fff0f5;
      box-shadow: 0 25px 50px -10px rgba(233, 120, 160, 0.25);
      border-radius: 40px;
      padding: 30px 24px;
      text-align: center;
      border: 1px solid rgba(255, 182, 193, 0.6);
    }

    .page { display: block; }
    .hidden-page { display: none !important; }

    h2 {
      font-size: 2.2rem;
      color: #d43f6b;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .emoji-big {
      font-size: 4rem;
      margin: 8px 0;
    }

    .couple-img {
      width: 160px;
      height: 160px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid #ffb7c5;
      box-shadow: 0 8px 25px rgba(255, 105, 135, 0.4);
      margin: 8px auto;
      display: block;
    }

    .couple-img-small {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid #ffb7c5;
      box-shadow: 0 6px 20px rgba(255, 105, 135, 0.35);
      margin: 8px auto 12px;
      display: block;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      margin: 16px 0;
    }

    .btn {
      padding: 14px 28px;
      border-radius: 100px;
      font-weight: 700;
      font-size: 1.2rem;
      cursor: pointer;
      background: #ffe4ec;
      color: #b3405a;
      box-shadow: 0 8px 18px rgba(200, 100, 120, 0.25);
      border: 1px solid #ffb6c1;
      flex: 1 1 auto;
      min-width: 120px;
      touch-action: manipulation;
      transition: 0.2s;
      border: none;
    }

    .btn:active {
      transform: scale(0.96);
      background: #ffbacb;
    }

    .yes-btn {
      background: #ffb7c5;
      color: #a12b42;
      font-weight: 800;
    }

    .message-box {
      background: #fff0f3;
      border-radius: 30px;
      padding: 12px 16px;
      margin: 12px 0;
      color: #c13b57;
      font-weight: 600;
      font-size: 1.1rem;
      border: 1px dashed #f590a8;
    }

    input[type="date"], input[type="text"] {
      width: 100%;
      padding: 14px 18px;
      border-radius: 60px;
      border: 1px solid #ffb7c5;
      font-size: 1.1rem;
      margin: 8px 0 14px;
      outline: none;
      text-align: center;
      background: white;
      font-family: inherit;
    }

    .option-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin: 14px 0;
    }

    .chip {
      background: white;
      padding: 12px 16px;
      border-radius: 50px;
      font-weight: 600;
      color: #b13b53;
      cursor: pointer;
      border: 1px solid #f9a5b9;
      flex: 1 1 calc(50% - 10px);
      min-width: 100px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(255, 140, 170, 0.2);
    }

    .chip.selected {
      background: #f7738b;
      color: white;
      border-color: #e64a6b;
      box-shadow: 0 8px 18px #f1607c70;
    }

    .next-btn {
      background: linear-gradient(135deg, #fd7b9c, #e75472);
      color: white;
      margin-top: 16px;
      width: 100%;
      font-size: 1.3rem;
      padding: 16px;
      border: none;
      border-radius: 100px;
      font-weight: 700;
      box-shadow: 0 12px 24px rgba(235, 80, 110, 0.45);
      cursor: pointer;
    }

    .love-final {
      font-size: 2.2rem;
      font-weight: 800;
      color: #ce3660;
      margin: 8px 0;
    }

    .sub-text {
      color: #b44b63;
      font-size: 1.1rem;
      margin: 4px 0 12px;
      font-style: italic;
    }

    .loading-msg {
      display: none;
      margin: 10px 0;
      color: #e75472;
      font-weight: 600;
      font-size: 1rem;
      animation: pulse 1s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .success-msg {
      color: #4caf50;
      font-weight: 700;
      font-size: 1rem;
      margin: 8px 0;
    }
    
    .error-msg {
      color: #f44336;
      font-weight: 600;
      font-size: 0.9rem;
      margin: 8px 0;
    }
  </style>
</head>
<body>
<div class="container" id="appContainer">

  <div id="page1" class="page">
    <div class="emoji-big">🥺💗</div>
    <img src="https://raw.githubusercontent.com/AnKhanhh0407/hello/main/159b4754-1a31-4709-af05-9b12b5d67147.jpg" alt="Ảnh đôi mình" class="couple-img">
    <h2>Em có yêu anh không?</h2>
    <div class="buttons">
      <button class="btn yes-btn" id="yesLoveBtn">Yêu nhiều ❤️</button>
      <button class="btn no-btn" id="noLoveBtn">Không 🙈</button>
    </div>
    <div id="loveMessage" class="message-box" style="display: none;"></div>
  </div>

  <div id="page2" class="page hidden-page">
    <div class="emoji-big">📅✨</div>
    <h2>Chọn ngày đi chơi nè</h2>
    <input type="date" id="datePicker" />
    <button class="btn next-btn" id="toPlaceBtn">Tiếp theo ➡️</button>
    <div id="dateWarning" style="color:#d43f6b; margin-top:6px; font-weight:500;"></div>
  </div>

  <div id="page3" class="page hidden-page">
    <div class="emoji-big">📍🍜</div>
    <h2>Muốn đi đâu nhất?</h2>
    <div class="option-group" id="placeOptions">
      <div class="chip" data-place="Đi ăn">🍣 Đi ăn</div>
      <div class="chip" data-place="Đi chơi">🎢 Đi chơi</div>
      <div class="chip" data-place="Đi lượn">🌃 Đi lượn</div>
      <div class="chip" data-place="custom" id="customChip">✍️ Khác...</div>
    </div>
    <input type="text" id="customPlaceInput" placeholder="Nhập nơi em thích..." style="display:none; margin-top:6px;" />
    <div class="loading-msg" id="loadingMsg">⏳ Đang gửi thông báo...</div>
    <button class="btn next-btn" id="toFinalBtn">Gửi lịch hẹn 💌</button>
    <div id="placeWarning" style="color:#d43f6b; margin-top:6px; font-weight:500;"></div>
    <div id="notifyStatus" class="success-msg"></div>
  </div>

  <div id="page4" class="page hidden-page">
    <div class="emoji-big">👑🐣</div>
    <img src="https://raw.githubusercontent.com/AnKhanhh0407/hello/main/159b4754-1a31-4709-af05-9b12b5d67147.jpg" alt="Ảnh đôi mình" class="couple-img-small">
    <h2 class="love-final">Tuân lệnh embeiuuuu</h2>
    <div style="font-size:2rem;">💖🐻💖</div>
    <p class="sub-text">Iu embe nhìu lắm luôn ý</p>
    <div id="summaryBox" style="background: #ffeef4; border-radius: 28px; padding: 18px; margin: 14px 0; color:#bf2f4b; font-weight:600; font-size:1.1rem; text-align:left; line-height:1.8;">
      ⏳ Đang tổng hợp...
    </div>
    <button class="btn next-btn" id="restartBtn" style="background:#ffb7c5; color:#a13048;">Hẹn lại từ đầu 🔁</button>
  </div>
</div>

<script>
  (function() {
    // ==================== CẤU HÌNH EMAILJS (ĐÃ CẬP NHẬT) ====================
    const EMAILJS_PUBLIC_KEY = "nAk_eOjPvp5ZPxdsE";
    const EMAILJS_SERVICE_ID = "service_nk3b54o";   // ✅ SERVICE ID MỚI
    const EMAILJS_TEMPLATE_ID = "template_zp410qu";  // ✅ TEMPLATE ID
    
    // Khởi tạo EmailJS
    emailjs.init(EMAILJS_PUBLIC_KEY);

    let selectedPlace = null;

    // DOM elements
    const page1 = document.getElementById('page1');
    const page2 = document.getElementById('page2');
    const page3 = document.getElementById('page3');
    const page4 = document.getElementById('page4');

    const yesLoveBtn = document.getElementById('yesLoveBtn');
    const noLoveBtn = document.getElementById('noLoveBtn');
    const loveMessage = document.getElementById('loveMessage');

    const datePicker = document.getElementById('datePicker');
    const toPlaceBtn = document.getElementById('toPlaceBtn');
    const dateWarning = document.getElementById('dateWarning');

    const placeChips = document.querySelectorAll('#placeOptions .chip');
    const customChip = document.getElementById('customChip');
    const customPlaceInput = document.getElementById('customPlaceInput');
    const toFinalBtn = document.getElementById('toFinalBtn');
    const placeWarning = document.getElementById('placeWarning');
    const loadingMsg = document.getElementById('loadingMsg');
    const notifyStatus = document.getElementById('notifyStatus');

    const summaryBox = document.getElementById('summaryBox');
    const restartBtn = document.getElementById('restartBtn');

    function showPage(page) {
      page1.classList.add('hidden-page');
      page2.classList.add('hidden-page');
      page3.classList.add('hidden-page');
      page4.classList.add('hidden-page');
      page.classList.remove('hidden-page');
    }

    function resetSelectionState() {
      selectedPlace = null;
      if (customPlaceInput) {
        customPlaceInput.style.display = 'none';
        customPlaceInput.value = '';
      }
      placeChips.forEach(chip => chip.classList.remove('selected'));
      if (datePicker) datePicker.value = '';
      if (dateWarning) dateWarning.innerText = '';
      if (placeWarning) placeWarning.innerText = '';
      if (notifyStatus) {
        notifyStatus.innerText = '';
        notifyStatus.className = 'success-msg';
      }
      if (loadingMsg) loadingMsg.style.display = 'none';
      if (loveMessage) {
        loveMessage.style.display = 'none';
        loveMessage.innerText = '';
      }
    }

    // ====== GỬI EMAIL ======
    function sendEmailNotification(formattedDate, placeDisplay) {
      loadingMsg.style.display = 'block';
      notifyStatus.innerText = '';
      toFinalBtn.disabled = true;
      toFinalBtn.style.opacity = '0.6';

      // Tạo nội dung tin nhắn đầy đủ
      const fullMessage = `✨ Em yêu đã đặt lịch hẹn với anh! ✨\n\n📅 Ngày: ${formattedDate}\n📍 Địa điểm: ${placeDisplay}\n\n💕 Yêu anh nhiều! 💕`;

      // Gửi với các biến phù hợp với template
      const templateParams = {
        name: "Em yêu 💕",
        email: "ankhanhh0407@gmail.com",
        message: fullMessage,
        date: formattedDate,
        place: placeDisplay
      };

      console.log("Service ID:", EMAILJS_SERVICE_ID);
      console.log("Template ID:", EMAILJS_TEMPLATE_ID);
      console.log("Đang gửi:", templateParams);

      emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams)
        .then(function(response) {
          console.log('✅ THÀNH CÔNG!', response.status, response.text);
          loadingMsg.style.display = 'none';
          notifyStatus.innerText = '✅ Đã gửi thông báo! Kiểm tra email (cả Spam) nha 💌';
          notifyStatus.className = 'success-msg';
          toFinalBtn.disabled = false;
          toFinalBtn.style.opacity = '1';
          
          setTimeout(() => {
            showPage(page4);
          }, 1500);
        }, function(error) {
          console.log('❌ LỖI CHI TIẾT:', error);
          loadingMsg.style.display = 'none';
          notifyStatus.innerText = '⚠️ Không gửi được mail nhưng lịch vẫn được lưu nha 💕';
          notifyStatus.className = 'error-msg';
          toFinalBtn.disabled = false;
          toFinalBtn.style.opacity = '1';
          
          setTimeout(() => {
            showPage(page4);
          }, 1000);
        });
    }

    // Page 1: Nút Không
    noLoveBtn.addEventListener('click', function() {
      loveMessage.style.display = 'block';
      loveMessage.innerText = '🙈 Oops sai rùi! Chọn lại đi em ơi 💗';
    });

    // Page 1: Nút Yêu
    yesLoveBtn.addEventListener('click', function() {
      loveMessage.style.display = 'none';
      resetSelectionState();
      if (datePicker) {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        datePicker.value = `${yyyy}-${mm}-${dd}`;
      }
      showPage(page2);
    });

    // Page 2: Chọn ngày
    toPlaceBtn.addEventListener('click', function() {
      const dateValue = datePicker.value;
      if (!dateValue) {
        dateWarning.innerText = '⚠️ Bé chọn một ngày đi chơi nha~';
        return;
      }
      dateWarning.innerText = '';
      showPage(page3);
    });

    // Page 3: Chọn địa điểm
    placeChips.forEach(chip => {
      chip.addEventListener('click', function() {
        const place = this.dataset.place;
        placeChips.forEach(c => c.classList.remove('selected'));
        
        if (place === 'custom') {
          customPlaceInput.style.display = 'block';
          customPlaceInput.focus();
          this.classList.add('selected');
          selectedPlace = null;
          if (customPlaceInput.value.trim() !== '') {
            selectedPlace = customPlaceInput.value.trim();
          }
        } else {
          customPlaceInput.style.display = 'none';
          selectedPlace = place;
          this.classList.add('selected');
          customPlaceInput.value = '';
        }
        placeWarning.innerText = '';
        notifyStatus.innerText = '';
      });
    });

    customPlaceInput.addEventListener('input', function() {
      const val = this.value.trim();
      if (val !== '') {
        selectedPlace = val;
        placeChips.forEach(c => c.classList.remove('selected'));
        customChip.classList.add('selected');
      } else {
        selectedPlace = null;
        customChip.classList.add('selected');
      }
      placeWarning.innerText = '';
    });

    // Page 3: Nút Gửi
    toFinalBtn.addEventListener('click', function() {
      if (!selectedPlace) {
        placeWarning.innerText = '💬 Bé chọn một nơi muốn đi nha (hoặc nhập khác)';
        return;
      }

      const dateVal = datePicker.value;
      let displayDate = 'Chưa chọn ngày';
      let formattedDate = 'Chưa chọn ngày';
      if (dateVal) {
        const [year, month, day] = dateVal.split('-');
        displayDate = `${day}/${month}/${year}`;
        formattedDate = `${day}/${month}/${year}`;
      }

      let placeDisplay = '';
      if (selectedPlace === 'Đi ăn') placeDisplay = '🍣 Đi ăn';
      else if (selectedPlace === 'Đi chơi') placeDisplay = '🎢 Đi chơi';
      else if (selectedPlace === 'Đi lượn') placeDisplay = '🌃 Đi lượn';
      else placeDisplay = `✨ ${selectedPlace}`;

      summaryBox.innerHTML = `
        <div style="font-size:1.3rem; text-align:center; margin-bottom:10px;">📋 Chi tiết hẹn hò</div>
        <div>📅 ${displayDate}</div>
        <div>📍 Địa điểm: ${placeDisplay}</div>
        <div style="margin-top:12px; text-align:center; font-style:italic;">💞 Anh chờ em tới lun 💞</div>
      `;

      sendEmailNotification(formattedDate, placeDisplay);
    });

    // Restart
    restartBtn.addEventListener('click', function() {
      resetSelectionState();
      showPage(page1);
      if (loveMessage) loveMessage.style.display = 'none';
      if (datePicker) {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        datePicker.value = `${yyyy}-${mm}-${dd}`;
      }
    });

    // Khởi tạo
    window.addEventListener('load', function() {
      if (datePicker) {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        datePicker.value = `${yyyy}-${mm}-${dd}`;
      }
      showPage(page1);
    });
  })();
</script>
</body>
</html>
